version: '3.8'

services:
  thunderbolt-backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: thunderbolt-backend:prod
    container_name: thunderbolt-backend
    ports:
      - '8000:8000'
    environment:
      # API Keys (use secrets in production)
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      # Gunicorn configuration
      - WORKERS=${WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ACCESS_LOG=${ACCESS_LOG:--}
      - ERROR_LOG=${ERROR_LOG:--}
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service=thunderbolt-backend'
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - thunderbolt-network

networks:
  thunderbolt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
