services:
  thunderbolt-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: thunderbolt-backend:latest
    container_name: thunderbolt-backend
    ports:
      - '8000:8000'
    environment:
      # Override these with your actual values or use .env file
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      # Additional environment variables for production
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
